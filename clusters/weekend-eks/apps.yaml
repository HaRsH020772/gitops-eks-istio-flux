apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure
  interval: 10m
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps
  prune: true
  wait: true
  # kustomize-controller decrypts SOPS-encrypted manifests natively using
  # the age private key from the sops-age secret. That secret must exist
  # BEFORE this block is pushed, or reconciliation fails.
  decryption:
    provider: sops
    secretRef:
      name: sops-age
