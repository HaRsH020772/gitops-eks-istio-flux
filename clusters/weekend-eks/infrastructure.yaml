apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  # First Istio install = 3 sequential HelmReleases + NLB provisioning;
  # 5m is too tight with wait: true.
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure
  prune: true
  # Ready only when everything applied (incl. HelmReleases) is healthy —
  # this is what makes apps' dependsOn wait for Istio, not just for the
  # manifests to be applied.
  wait: true
