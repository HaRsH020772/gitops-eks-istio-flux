name: validate

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "kubernetes/**"
      - "clusters/**"
      - ".github/workflows/validate.yaml"
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - "kubernetes/**"
      - "clusters/**"
      - ".github/workflows/validate.yaml"

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate

  manifests:
    runs-on: ubuntu-latest
    env:
      # datree CRD catalog supplies schemas for Flux, Istio and Gateway API kinds
      SCHEMAS: >-
        -schema-location default
        -schema-location
        https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | sudo tar xz -C /usr/local/bin kubeconform

      - name: Validate kustomize overlays
        run: |
          set -euo pipefail
          for dir in \
            kubernetes/infrastructure/controllers \
            kubernetes/infrastructure/configs \
            kubernetes/apps/staging \
            kubernetes/apps/production; do
            echo "--- $dir"
            kubectl kustomize "$dir" | kubeconform $SCHEMAS -strict -summary -skip CustomResourceDefinition
          done

      - name: Validate Flux entry manifests
        run: |
          set -euo pipefail
          kubeconform $SCHEMAS -strict -summary \
            clusters/dev/infrastructure.yaml \
            clusters/dev/apps.yaml \
            clusters/dev/image-automation.yaml
