name: ci

on:
  push:
    branches: [main]
    paths:
      - "apps/demo-app/**"
      - ".github/workflows/ci.yaml"
  pull_request:
    branches: [main]
    paths:
      - "apps/demo-app/**"
      - ".github/workflows/ci.yaml"

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/demo-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/demo-app/go.mod
          cache: false
      - run: go vet ./...
      - run: go test ./... -v

  build-push:
    # Only push images from main; PRs stop at the test job.
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/demo-app
          tags: |
            # sortable tag that Flux's staging ImagePolicy tracks
            type=raw,value=main-{{sha}}-{{date 'YYYYMMDDHHmmss'}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: apps/demo-app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=main-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
