# Link 1: cluster-wide Istio CRDs and webhooks. No workloads.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-base
  namespace: istio-system
spec:
  interval: 30m
  timeout: 5m
  chart:
    spec:
      chart: base
      version: "1.30.x"
      sourceRef:
        kind: HelmRepository
        name: istio
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
