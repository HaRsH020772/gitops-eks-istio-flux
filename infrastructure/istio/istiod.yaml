# Link 2: the control plane. Waits for istio-base's CRDs.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istiod
  namespace: istio-system
spec:
  interval: 30m
  timeout: 5m
  dependsOn:
    - name: istio-base
  chart:
    spec:
      chart: istiod
      version: "1.30.x"
      sourceRef:
        kind: HelmRepository
        name: istio
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    pilot:
      # Sized for t3.medium nodes; chart defaults request 500m/2Gi.
      autoscaleEnabled: false
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
    meshConfig:
      accessLogFile: /dev/stdout
