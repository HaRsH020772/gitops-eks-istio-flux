apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istiod
  namespace: istio-system
spec:
  interval: 30m
  dependsOn:
    - name: istio-base
  chart:
    spec:
      chart: istiod
      version: "1.30.x"
      sourceRef:
        kind: HelmRepository
        name: istio
  values:
    pilot:
      # Sized for 2x t3.medium spot nodes; defaults request 500m/2Gi
      autoscaleEnabled: false
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
    meshConfig:
      accessLogFile: /dev/stdout
