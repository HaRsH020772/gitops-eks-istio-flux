apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: staging
resources:
  - namespace.yaml
  - ../base/demo-app
patches:
  - target:
      kind: HTTPRoute
      name: demo-app
    patch: |
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: demo-app
      spec:
        hostnames:
          - staging.demo.local
  - target:
      kind: Deployment
      name: demo-app
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: demo-app
      spec:
        template:
          spec:
            containers:
              - name: demo-app
                env:
                  - name: APP_MESSAGE
                    value: "Hello from STAGING"
images:
  - name: ghcr.io/harsh020772/demo-app
    newTag: latest # {"$imagepolicy": "flux-system:demo-app-staging:tag"}
