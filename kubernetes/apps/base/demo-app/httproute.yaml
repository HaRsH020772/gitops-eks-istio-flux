apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: demo-app
  labels:
    app: demo-app
spec:
  parentRefs:
    - name: public-gateway
      namespace: istio-ingress
  hostnames:
    - demo.local # overridden per overlay
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      timeouts:
        request: 10s
      backendRefs:
        - name: demo-app
          port: 80
